<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParrotCare AI - 鹦鹉健康监测</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .parrot-icon {
            font-size: 48px;
        }
        .status-healthy {
            color: #28a745;
        }
        .status-warning {
            color: #ffc107;
        }
        .status-danger {
            color: #dc3545;
        }
    </style>
</head>
<body class="gradient-bg">
    <!-- 登录页面 -->
    <div id="login-page" class="container d-flex align-items-center justify-content-center">
        <div class="card p-4 shadow-lg" style="width: 100%; max-width: 400px;">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">
                    <span class="parrot-icon">🦜</span> ParrotCare AI
                </h3>
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        <input type="tel" class="form-control" id="phone" placeholder="请输入手机号">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" placeholder="请输入密码">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">登录</button>
                    <p class="text-center mt-3">
                        <a href="#" id="register-link">没有账号？注册</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <!-- 注册页面 -->
    <div id="register-page" class="container d-flex align-items-center justify-content-center" style="display: none;">
        <div class="card p-4 shadow-lg" style="width: 100%; max-width: 400px;">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">注册账号</h3>
                <form id="register-form">
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        <input type="tel" class="form-control" id="reg-phone" placeholder="请输入手机号">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" id="reg-password" placeholder="请输入密码">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">昵称</label>
                        <input type="text" class="form-control" id="reg-nickname" placeholder="请输入昵称">
                    </div>
                    <button type="submit" class="btn btn-success w-100">注册</button>
                    <p class="text-center mt-3">
                        <a href="#" id="back-login-link">返回登录</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <!-- 主页 -->
    <div id="home-page" class="container py-4" style="display: none;">
        <div class="row">
            <!-- 今日状态卡片 -->
            <div class="col-12 mb-4">
                <div class="card card-hover shadow">
                    <div class="card-body">
                        <h5 class="card-title">
                            <span class="parrot-icon">🦜</span>
                            <span id="parrot-name">小灰</span> - 今日状态
                        </h5>
                        <div class="row text-center">
                            <div class="col-4">
                                <div class="display-4 status-healthy" id="health-score">100</div>
                                <small class="text-muted">健康评分</small>
                            </div>
                            <div class="col-4">
                                <div class="display-4" id="chirp-count">0</div>
                                <small class="text-muted">鸣叫次数</small>
                            </div>
                            <div class="col-4">
                                <div class="display-4" id="scream-count">0</div>
                                <small class="text-muted">异常尖叫</small>
                            </div>
                        </div>
                        <p class="mt-3 text-center" id="status-summary">今日暂无数据</p>
                    </div>
                </div>
            </div>

            <!-- 鹦鹉档案 -->
            <div class="col-12 mb-4">
                <div class="card card-hover shadow">
                    <div class="card-header">
                        <h5>鹦鹉档案</h5>
                    </div>
                    <div class="card-body">
                        <div id="parrots-list">
                            <!-- 鹦鹉列表将动态加载 -->
                        </div>
                        <button class="btn btn-outline-primary mt-3" id="add-parrot-btn">
                            + 添加鹦鹉
                        </button>
                    </div>
                </div>
            </div>

            <!-- 事件列表 -->
            <div class="col-12 mb-4">
                <div class="card card-hover shadow">
                    <div class="card-header">
                        <h5>异常事件</h5>
                    </div>
                    <div class="card-body">
                        <ul class="list-group" id="events-list">
                            <!-- 事件列表将动态加载 -->
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 录音按钮 -->
            <div class="col-12">
                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-lg" id="record-btn">
                        🎤 开始录音
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加鹦鹉弹窗 -->
    <div class="modal fade" id="add-parrot-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">添加鹦鹉</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="add-parrot-form">
                        <div class="mb-3">
                            <label class="form-label">鹦鹉名字</label>
                            <input type="text" class="form-control" id="parrot-name-input" placeholder="例如：小灰">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">品种</label>
                            <select class="form-select" id="parrot-species">
                                <option value="African Grey">非洲灰鹦鹉</option>
                                <option value="Cockatiel">玄凤鹦鹉</option>
                                <option value="Budgerigar">虎皮鹦鹉</option>
                                <option value="Macaw">金刚鹦鹉</option>
                                <option value="Other">其他</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">年龄</label>
                            <input type="number" class="form-control" id="parrot-age" placeholder="例如：3">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="save-parrot-btn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        let token = localStorage.getItem('token');
        let currentParrotId = null;

        // 页面切换
        function showPage(pageId) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('register-page').style.display = 'none';
            document.getElementById('home-page').style.display = 'none';
            document.getElementById(pageId).style.display = 'block';
        }

        // 登录
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            try {
                const resp = await fetch(`${API_BASE}/users/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone, password})
                });
                const data = await resp.json();
                if (data.access_token) {
                    token = data.access_token;
                    localStorage.setItem('token', token);
                    showPage('home-page');
                    loadParrots();
                    loadEvents();
                } else {
                    alert('登录失败: ' + (data.message || '未知错误'));
                }
            } catch (err) {
                alert('网络错误: ' + err.message);
            }
        });

        // 注册
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('reg-phone').value;
            const password = document.getElementById('reg-password').value;
            const nickname = document.getElementById('reg-nickname').value;
            
            try {
                const resp = await fetch(`${API_BASE}/users/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone, password, nickname})
                });
                const data = await resp.json();
                if (data.access_token) {
                    token = data.access_token;
                    localStorage.setItem('token', token);
                    showPage('home-page');
                    loadParrots();
                } else {
                    alert('注册失败: ' + (data.message || '未知错误'));
                }
            } catch (err) {
                alert('网络错误: ' + err.message);
            }
        });

        // 加载鹦鹉列表
        async function loadParrots() {
            try {
                const resp = await fetch(`${API_BASE}/parrots`, {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const parrots = await resp.json();
                const list = document.getElementById('parrots-list');
                list.innerHTML = '';
                
                if (parrots.length === 0) {
                    list.innerHTML = '<p class="text-muted">暂无鹦鹉档案</p>';
                    return;
                }
                
                parrots.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card mb-2';
                    card.innerHTML = `
                        <div class="card-body d-flex justify-content-between">
                            <div>
                                <h6>${p.name}</h6>
                                <small>${p.species} · ${p.age}岁</small>
                            </div>
                            <button class="btn btn-sm btn-outline-primary" onclick="selectParrot('${p.parrot_id}', '${p.name}')">
                                查看详情
                            </button>
                        </div>
                    `;
                    list.appendChild(card);
                });
                
                // 选择第一个鹦鹉
                if (parrots.length > 0) {
                    selectParrot(parrots[0].parrot_id, parrots[0].name);
                }
            } catch (err) {
                console.error('加载鹦鹉失败:', err);
            }
        }

        // 选择鹦鹉
        async function selectParrot(parrotId, name) {
            currentParrotId = parrotId;
            document.getElementById('parrot-name').textContent = name;
            
            // 加载今日摘要
            try {
                const resp = await fetch(`${API_BASE}/parrots/${parrotId}/today-summary`, {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const summary = await resp.json();
                
                document.getElementById('health-score').textContent = summary.health_score;
                document.getElementById('chirp-count').textContent = summary.chirp_count;
                document.getElementById('scream-count').textContent = summary.scream_count;
                document.getElementById('status-summary').textContent = summary.summary;
                
                const scoreEl = document.getElementById('health-score');
                scoreEl.className = 'display-4';
                if (summary.health_score >= 80) {
                    scoreEl.classList.add('status-healthy');
                } else if (summary.health_score >= 60) {
                    scoreEl.classList.add('status-warning');
                } else {
                    scoreEl.classList.add('status-danger');
                }
            } catch (err) {
                console.error('加载摘要失败:', err);
            }
        }

        // 加载事件
        async function loadEvents() {
            try {
                const resp = await fetch(`${API_BASE}/events`, {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const events = await resp.json();
                const list = document.getElementById('events-list');
                list.innerHTML = '';
                
                if (events.length === 0) {
                    list.innerHTML = '<li class="list-group-item text-muted">暂无异常事件</li>';
                    return;
                }
                
                events.forEach(e => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item';
                    li.innerHTML = `
                        <div class="d-flex justify-content-between">
                            <div>
                                <span class="badge bg-warning">${e.event_type}</span>
                                ${e.description || '异常行为'}
                            </div>
                            <small class="text-muted">${new Date(e.event_time).toLocaleString()}</small>
                        </div>
                    `;
                    list.appendChild(li);
                });
            } catch (err) {
                console.error('加载事件失败:', err);
            }
        }

        // 添加鹦鹉
        document.getElementById('save-parrot-btn').addEventListener('click', async () => {
            const name = document.getElementById('parrot-name-input').value;
            const species = document.getElementById('parrot-species').value;
            const age = parseInt(document.getElementById('parrot-age').value) || 0;
            
            try {
                const resp = await fetch(`${API_BASE}/parrots`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({name, species, age})
                });
                const data = await resp.json();
                if (data.parrot_id) {
                    bootstrap.Modal.getOrCreateInstance(document.getElementById('add-parrot-modal')).hide();
                    loadParrots();
                }
            } catch (err) {
                alert('添加失败: ' + err.message);
            }
        });

        // 录音功能
        let mediaRecorder;
        let audioChunks = [];

        document.getElementById('record-btn').addEventListener('click', async () => {
            if (!currentParrotId) {
                alert('请先选择鹦鹉');
                return;
            }
            
            const btn = document.getElementById('record-btn');
            
            if (!mediaRecorder) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
                    mediaRecorder = new MediaRecorder(stream);
                    
                    mediaRecorder.ondataavailable = (e) => {
                        audioChunks.push(e.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const blob = new Blob(audioChunks, {type: 'audio/webm'});
                        audioChunks = [];
                        
                        // 发送音频
                        const formData = new FormData();
                        formData.append('file', blob, 'recording.webm');
                        formData.append('parrot_id', currentParrotId);
                        
                        btn.textContent = '⏳ 上传分析中...';
                        btn.disabled = true;
                        
                        try {
                            const resp = await fetch(`${API_BASE}/audio/upload`, {
                                method: 'POST',
                                headers: {'Authorization': 'Bearer ' + token},
                                body: formData
                            });
                            const data = await resp.json();
                            
                            btn.textContent = '🎤 开始录音';
                            btn.disabled = false;
                            
                            if (data.event_id) {
                                alert('分析完成: ' + data.classification);
                                loadEvents();
                                selectParrot(currentParrotId, document.getElementById('parrot-name').textContent);
                            }
                        } catch (err) {
                            btn.textContent = '🎤 开始录音';
                            btn.disabled = false;
                            alert('上传失败: ' + err.message);
                        }
                    };
                    
                    mediaRecorder.start();
                    btn.textContent = '⏹ 停止录音';
                } catch (err) {
                    alert('无法访问麦克风: ' + err.message);
                }
            } else {
                mediaRecorder.stop();
                mediaRecorder = null;
            }
        });

        // 页面切换事件
        document.getElementById('register-link').addEventListener('click', () => showPage('register-page'));
        document.getElementById('back-login-link').addEventListener('click', () => showPage('login-page'));
        document.getElementById('add-parrot-btn').addEventListener('click', () => {
            bootstrap.Modal.getOrCreateInstance(document.getElementById('add-parrot-modal')).show();
        });

        // 自动登录检查
        if (token) {
            showPage('home-page');
            loadParrots();
            loadEvents();
        }
    </script>
</body>
</html>
