<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#4CAF50"/>
  <!-- Parrot body -->
  <ellipse cx="220" cy="280" rx="90" ry="120" fill="#FF6F00"/>
  <!-- Parrot belly -->
  <ellipse cx="220" cy="310" rx="55" ry="75" fill="#FFD54F"/>
  <!-- Parrot head -->
  <circle cx="200" cy="160" r="75" fill="#FF6F00"/>
  <!-- Parrot eye -->
  <circle cx="180" cy="150" r="18" fill="#FFFFFF"/>
  <circle cx="178" cy="152" r="10" fill="#212121"/>
  <!-- Parrot beak -->
  <path d="M 130 170 Q 100 180 110 210 Q 130 200 145 195 Z" fill="#FFD54F"/>
  <path d="M 110 210 Q 115 220 130 215 Q 135 205 145 195 Z" fill="#FF8F00"/>
  <!-- Parrot wing -->
  <path d="M 270 220 Q 340 200 360 280 Q 340 320 280 310 Q 260 270 270 220 Z" fill="#1976D2"/>
  <path d="M 280 230 Q 330 220 345 270 Q 330 300 285 295 Q 270 265 280 230 Z" fill="#42A5F5"/>
  <!-- Parrot tail feathers -->
  <path d="M 220 380 L 180 470 L 210 460 L 230 490 L 240 420 Z" fill="#1565C0"/>
  <path d="M 230 380 L 220 480 L 245 470 L 255 495 L 260 420 Z" fill="#42A5F5"/>
  <!-- Parrot crest -->
  <path d="M 195 90 Q 185 60 205 50 Q 220 65 215 95 Z" fill="#C62828"/>
  <path d="M 215 85 Q 225 55 240 55 Q 245 75 235 100 Z" fill="#E53935"/>
  <!-- Feet -->
  <line x1="200" y1="390" x2="195" y2="420" stroke="#FF8F00" stroke-width="8" stroke-linecap="round"/>
  <line x1="240" y1="390" x2="245" y2="420" stroke="#FF8F00" stroke-width="8" stroke-linecap="round"/>
</svg>